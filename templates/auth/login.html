{% extends 'base.html' %}

{% block title %}Log In - Broke Geniuses{% endblock %}

{% block content %}
<div class="container py-5 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card glass-card border-0 shadow-lg p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock-fill fs-3"></i>
                    </div>
                    <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
                    <p class="text-muted small">Log in to access your campus marketplace</p>
                </div>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <!-- CSRF Token -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label for="login_id" class="form-label fw-medium text-dark">Username or Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-fill text-muted"></i></span>
                            <input type="text" id="login_id" name="login_id" class="form-control border-start-0 ps-0" placeholder="e.g. coder_raj or raj@iitb.ac.in" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label fw-medium text-dark">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key-fill text-muted"></i></span>
                            <input type="password" id="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="mb-4 d-flex align-items-center justify-content-between">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label text-muted small" for="remember">Remember me</label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                    </button>
                    
                    <div class="text-center mt-3">
                        <span class="text-muted small">New to Broke Geniuses? </span>
                        <a href="{{ url_for('auth.signup') }}" class="text-decoration-none fw-semibold small text-primary">Create an account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
